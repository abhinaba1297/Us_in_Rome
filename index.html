<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rome, with you ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-hearts"></div>

  <main class="app">
    <section class="card">
      <div class="topbar">
        <div class="pill">Rome ✨ For Clara</div>
        <div class="progress-wrap">
          <div class="progress" id="progressBar"></div>
        </div>
      </div>

      <div class="content">
        <div class="location" id="locationText"></div>
        <div class="story-image-wrap" id="imageWrap"></div>
        <div class="story-text" id="storyText"></div>
      </div>

      <div class="controls" id="controls"></div>
    </section>
  </main>

  <audio id="bgMusic" preload="auto" loop playsinline>
    <source src="./rome-music.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
